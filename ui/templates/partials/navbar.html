{{define "navbar"}}
<nav class="sticky top-0 z-50 w-full border-b border-dark-border bg-dark-900/80 backdrop-blur-lg" x-data="{ open: false }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="/" class="flex items-center gap-2" hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML">
                    <svg class="h-8 w-8 text-go-cyan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                        <line x1="4" y1="22" x2="4" y2="15"></line>
                    </svg>
                    <span class="text-xl font-bold tracking-tight text-white">Go<span class="text-go-cyan">Verse</span></span>
                </a>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="/learn" class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Learn</a>
                <a href="/practice" class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Practice</a>
                <a href="/projects" class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Projects</a>
                <a href="/roadmap" class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Roadmap</a>
            </div>

            <!-- Auth / User -->
            <div class="hidden md:flex items-center space-x-4">
                <button class="text-gray-400 hover:text-white" title="Search (Cmd+K)">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
                <a href="/login" class="text-sm font-medium text-gray-300 hover:text-white">Sign In</a>
                <a href="/dashboard" class="btn-primary text-sm">Dashboard</a>
            </div>

            <!-- Mobile menu button -->
            <div class="md:hidden flex items-center">
                <button @click="open = !open" class="text-gray-300 hover:text-white p-2">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        <path x-show="open" style="display: none;" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="open" style="display: none;" class="md:hidden border-b border-dark-border bg-dark-800">
        <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
            <a href="/learn" class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-dark-700">Learn</a>
            <a href="/practice" class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-dark-700">Practice</a>
            <a href="/dashboard" class="block px-3 py-2 rounded-md text-base font-medium text-go-cyan hover:text-white hover:bg-dark-700">Dashboard</a>
        </div>
    </div>
</nav>
{{end}}
