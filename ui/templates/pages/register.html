{{define "register"}}
<div class="relative min-h-[calc(100vh-80px)] flex items-center justify-center overflow-hidden bg-dark-900">
    <!-- Animated background glowing blobs -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-go-emerald/20 rounded-full mix-blend-screen filter blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-blue-600/20 rounded-full mix-blend-screen filter blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

    <div class="relative w-full max-w-md p-10 glass-card border border-white/10 shadow-[0_0_50px_rgba(52,211,153,0.1)] rounded-2xl z-10 backdrop-blur-xl bg-dark-800/60">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-go-emerald to-blue-500 mb-4 shadow-[0_0_20px_rgba(52,211,153,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-dark-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight">Join GoVerse</h2>
            <p class="text-sm text-gray-400 mt-2">Elevate your code. Start your journey today.</p>
        </div>

        {{if .Error}}
        <div class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/50 text-red-500 text-sm text-center">
            {{.Error}}
        </div>
        {{end}}
        <form action="/register" method="POST" class="space-y-6">
            <div class="space-y-1">
                <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-500 group-focus-within:text-go-emerald transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="text" id="username" name="username" class="w-full pl-11 pr-4 py-3 bg-dark-900/50 border border-white/10 rounded-xl focus:outline-none focus:border-go-emerald focus:ring-1 focus:ring-go-emerald text-white placeholder-gray-500 transition-all duration-300 shadow-inner" placeholder="johndoe" required>
                </div>
            </div>

            <div class="space-y-1">
                <label for="email" class="block text-sm font-medium text-gray-300">Email Address</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-500 group-focus-within:text-go-emerald transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="email" id="email" name="email" class="w-full pl-11 pr-4 py-3 bg-dark-900/50 border border-white/10 rounded-xl focus:outline-none focus:border-go-emerald focus:ring-1 focus:ring-go-emerald text-white placeholder-gray-500 transition-all duration-300 shadow-inner" placeholder="gopher@domain.com" required>
                </div>
            </div>

            <div class="space-y-1">
                <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-500 group-focus-within:text-go-emerald transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="password" id="password" name="password" class="w-full pl-11 pr-4 py-3 bg-dark-900/50 border border-white/10 rounded-xl focus:outline-none focus:border-go-emerald focus:ring-1 focus:ring-go-emerald text-white placeholder-gray-500 transition-all duration-300 shadow-inner" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-go-emerald to-[#10b981] hover:from-[#059669] hover:to-go-emerald text-dark-900 font-bold rounded-xl shadow-[0_0_20px_rgba(52,211,153,0.3)] hover:shadow-[0_0_30px_rgba(52,211,153,0.5)] transform hover:-translate-y-0.5 transition-all duration-300">
                Create Account
            </button>
            
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink-0 mx-4 text-xs text-gray-500 uppercase tracking-wider">Or continue with</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>
            
            <div class="flex gap-4 justify-center">
                <button type="button" class="p-3 bg-dark-900/80 border border-white/10 rounded-full hover:bg-dark-800 hover:border-white/30 transition-all duration-300 group">
                    <svg class="h-5 w-5 text-gray-400 group-hover:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>
                    </svg>
                </button>
            </div>
        </form>
        
        <p class="mt-8 text-center text-sm text-gray-400">
            Already have an account? <a href="/login" class="text-go-emerald hover:text-white transition-colors font-medium">Sign in</a>
        </p>
    </div>
</div>
{{end}}
