{{define "architecture"}}
<div class="h-full flex flex-col w-full bg-app overflow-y-auto relative">
    <!-- Ambient Background Effects -->
    <div class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none z-0 fixed">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-glow/5 blur-[120px] mix-blend-screen"></div>
        <div class="absolute top-[40%] -right-[10%] w-[30%] h-[50%] rounded-full bg-blue-500/5 blur-[120px] mix-blend-screen"></div>
    </div>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full relative z-10">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-4 flex items-center justify-center gap-3">
                <svg class="w-10 h-10 text-glow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                Project <span class="text-transparent bg-clip-text bg-gradient-to-r from-glow to-blue-400">Architecture</span>
            </h1>
            <p class="text-xl text-gray-400 max-w-2xl mx-auto">Deep dive into GoVerse's system design, directory structure, and code organization.</p>
        </div>

        <!-- Render Markdown Content -->
        <article class="glass-card p-8 md:p-12 prose prose-invert prose-pre:bg-black prose-pre:border prose-pre:border-dark-border prose-a:text-go-cyan hover:prose-a:text-go-blue prose-headings:text-white prose-p:text-gray-300 max-w-none">
            {{.Content}}
        </article>
    </div>
</div>



<style>
    /* Styling for the mermaid svg to ensure it contrasts well on dark background */
    .mermaid svg {
        max-width: 100%;
        height: auto;
    }
</style>
{{end}}
