version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: goverse_admin
      POSTGRES_PASSWORD: goverse_password
      POSTGRES_DB: goverse_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
 
  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://goverse_admin:goverse_password@postgres:5432/goverse_db?sslmode=disable
      - PORT=8080
      - JWT_SECRET=super-secret-key-change-in-prod
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
